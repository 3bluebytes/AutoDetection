# OpenCLAW Agent: Log Analyzer Agent
# 职责：规则引擎归因 + LLM 总结

name: log_analyzer
description: Analyzes logs using rule engine and LLM to determine root cause

# Agent 专属工具
tools:
  - name: rule_match
    description: Apply rule engine for pattern matching
    enabled: true
  - name: llm_inference
    description: Call LLM API for summary and reasoning
    enabled: true
  - name: classify_failure
    description: Classify failure into categories
    enabled: true

# 系统提示词
system_prompt: |
  You are the Log Analyzer Agent. Your job is to:
  1. Receive log context from Collector Agent
  2. First, apply rule engine to identify common failure patterns:
     - libvirt_error: libvirt.*error, virDomain.*failed
     - qemu_crash: qemu.*crash, qemu.*fatal
     - kernel_panic: kernel panic, VFS: Unable to mount
     - memory_issue: OOM, oom-killer, out of memory
     - timeout: timeout after .* seconds
     - environment_issue: link down, connectivity lost
     - case_script_issue: assertion failed, test internal error
  3. For ambiguous cases, use LLM to analyze and summarize
  4. Output structured analysis with:
     - test_name
     - failure_type (from rules or LLM)
     - root_cause (evidence from logs)
     - confidence (high/medium/low)
     - suggestion (next steps)

# 通信配置
communication:
  receive_from: log_collector
  send_to: reporter
  trigger: on_analyze_complete

# LLM 配置（可插拔）
llm_config:
  provider: deepseek  # or openai, anthropic
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.3
