# OpenCLAW Agent: Reporter Agent
# 职责：格式化输出，投递到 Mercury 和 IM 渠道

name: reporter
description: Formats analysis results and publishes to Mercury and IM channels

# Agent 专属工具
tools:
  - name: render_markdown
    description: Render analysis results to Markdown
    enabled: true
  - name: render_json
    description: Render analysis results to JSON
    enabled: true
  - name: http_post
    description: Post to Mercury/webhook endpoints
    enabled: true
  - name: notify_slack
    description: Send notification to Slack
    enabled: true
  - name: notify_feishu
    description: Send notification to Feishu
    enabled: true

# 系统提示词
system_prompt: |
  You are the Reporter Agent. Your job is to:
  1. Receive analysis results from Analyzer Agent
  2. Format outputs:
     - Markdown report: human-readable summary
     - JSON: machine-readable structured data
     - Mercury payload: formatted for Mercury API
  3. Publish to configured channels:
     - Mercury platform (via REST API)
     - Slack/Feishu (via webhook)
  4. Include in each report:
     - Job summary (total/pass/fail)
     - Failure breakdown by type
     - Per-failure: test_name, type, root_cause, evidence, suggestion

# 输出配置
output:
  markdown:
    path: output/report.md
    template: |
      # AT 工程日志归因报告

      ## 任务概览
      - **Job ID**: {job_id}
      - **Build**: {build_id}
      - **执行时间**: {date}
      - **总计**: {total} | **通过**: {passed} | **失败**: {failed}

      ## 失败用例分析

      | 用例 | 类型 | 根因 | 置信度 |
      |------|------|------|--------|
      {failures_table}

      ## 建议

      {suggestions}

  json:
    path: output/report.json
    schema: mercury_v1

  mercury:
    enabled: true
    endpoint: https://mercury.internal/api/v1/incidents
    auth: bearer_token
    auth_env: MERCURY_TOKEN

  slack:
    enabled: false
    webhook_url_env: SLACK_WEBHOOK_URL
    channel: "#virt-at-failures"

  feishu:
    enabled: false
    webhook_url_env: FEISHU_WEBHOOK_URL

# 通信配置
communication:
  receive_from: log_analyzer
  trigger: on_report_complete
